name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub release
  id-token: write   # required for npm provenance

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full tag history required for changelog

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node's bundled npm may be older
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      # No token: npm exchanges the GitHub id-token via trusted publishing (OIDC).
      # Provenance is generated automatically on top of it.
      - name: Publish package
        run: npm publish --access public

      # Run last so a failed publish never creates a dangling GitHub release
      - name: Generate changelog & GitHub release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
