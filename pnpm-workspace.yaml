# Security overrides: force patched versions of vulnerable transitive deps
# that upstream packages still pin to old, flagged versions.
# All are same-major, drop-in-safe bumps. See `pnpm audit`.
overrides:
  dompurify: ^3.4.11
  lodash-es: ^4.18.1
  braces: ^3.0.3
  cross-spawn: ^7.0.6
  js-yaml@3: ^3.15.0
  brace-expansion@1: ^1.1.12
  brace-expansion@2: ^2.0.2
  rollup@3: ^3.30.0
  picomatch@2: ^2.3.2

# Allow ONLY these vetted packages to run install/build scripts (pnpm 11
# blocks all dependency lifecycle scripts by default via strictDepBuilds).
# esbuild needs its postinstall to set up its platform binary; Slidev/Vite
# can't build without it. Everything else stays blocked.
allowBuilds:
  esbuild: true

minimumReleaseAgeExclude:
  - globby@16.2.1
